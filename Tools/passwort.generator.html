<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <title>Passwort Generator – IT-Web Tools</title>
        <link rel="icon" type="image/png" href="../icons8-macbook-einstellungen-windows-11-color-32.png">
        <link rel="stylesheet" href="../styles.css">
    </head>
    <body>
        <div id="sidebar">
            <h1>IT-Web Tools</h1>
            <h5>ein tool wählen</h5>
            <a href="../index.html">Startseite</a>
            <a href="subnetzrechner.html">Subnetzrechner</a>
            <a href="Zahlensystemrechner.html">Zahlensystemrechner</a>
            <a href="passwort.generator.html">Passwort Generator</a>
            <a href="portmap.html">Portmap</a>
        </div>
        <main>
            <div class="tool-panel">
                <h1 class="tool-panel-title">Passwort Generator</h1>
                <div class="input-row">
                    <input type="number" id="laenge" value="12" min="4" max="128" placeholder="Länge">
                    <button id="btnGenerieren">Generieren</button>
                    <button id="btnKopieren">Kopieren</button>
                </div>
                <div id="ergebnis"></div>
            </div>
        </main>

        <script>
        const zeichen = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+";

        function generieren() {
            const laenge = parseInt(document.getElementById("laenge").value);
            const array = new Uint32Array(laenge);
            crypto.getRandomValues(array);
            let passwort = "";
            for (let i = 0; i < laenge; i++) {
                passwort += zeichen[array[i] % zeichen.length];
            }
            document.getElementById("ergebnis").textContent = passwort;
        }

        document.getElementById("btnGenerieren").addEventListener("click", generieren);

        document.getElementById("btnKopieren").addEventListener("click", function () {
            const text = document.getElementById("ergebnis").textContent;
            if (!text) return;
            navigator.clipboard.writeText(text);
            this.textContent = "Kopiert!";
            setTimeout(() => this.textContent = "Kopieren", 1500);
        });
        </script>
    </body>
</html>
